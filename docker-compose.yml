services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Tokyo
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    working_dir: /app
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bash -lc "rm -f tmp/pids/server.pid && bin/rails server -b 0.0.0.0 -p 3000"
    environment:
      RAILS_ENV: development
      TZ: Asia/Tokyo
      DATABASE_URL: ${DATABASE_URL}
      DISABLE_SPRING: "1"
    depends_on:
      - db
    ports:
      - "3000:3000"
    volumes:
      - .:/app:cached
      - bundle:/usr/local/bundle
    tty: true
    stdin_open: true

volumes:
  pgdata:
  bundle:
